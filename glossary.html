<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Phoenix Glossary</title>
  <style>
    body { font-family: system-ui, sans-serif; background: #0f0f0f; color: #ddd; margin: 0; padding: 20px; }
    h1 { color: #00ddff; }
    .nav-btn { background: #1a1a1a; color: #00ddff; padding: 10px 20px; border: 1px solid #00ddff; border-radius: 6px; cursor: pointer; font-size: 1rem; margin: 0 5px 10px 0; text-decoration: none; display: inline-block; }
    .nav-btn:hover { background: #00ddff; color: #000; }
    .admin-btn { background: #ffaa00; color: #000; padding: 12px 24px; border: none; border-radius: 6px; cursor: pointer; font-size: 1.1rem; margin: 10px 0; }
    input { width: 100%; padding: 12px; margin: 20px 0; background: #1a1a1a; color: #ddd; border: 1px solid #444; border-radius: 6px; font-size: 1.05rem; box-sizing: border-box; }
    table { width: 100%; border-collapse: collapse; background: #1a1a1a; margin-top: 10px; }
    th, td { padding: 12px; text-align: left; border-bottom: 1px solid #333; cursor: pointer; }
    th { background: #222; position: sticky; top: 0; }
    tr:hover { background: #252525; }
    .name-col { width: 32%; font-weight: 600; color: #00ddff; }
    #status { margin: 15px 0; font-style: italic; color: #aaa; }
    #detail-panel { background: #1a1a1a; padding: 20px; margin-top: 20px; border-radius: 8px; display: none; max-height: 600px; overflow: auto; }
    pre { background: #111; padding: 15px; overflow: auto; white-space: pre-wrap; }
    .note { background: #332200; padding: 15px; border-radius: 6px; margin-bottom: 20px; color: #ffcc66; }
  </style>
</head>
<body>
  <h1>Phoenix Glossary</h1>

  <a href="index.html" class="nav-btn">&#8592; Back to Home</a>
  <a href="review.html" class="nav-btn">&#128269; Review Platform</a>

  <div class="note">
    <strong>Note:</strong> Many entries currently have no readable name (test data).
    A clean delete + re-intake will be done soon once auto-intake is fully active.
  </div>

  <button class="admin-btn" onclick="window.open('https://github.com/jwl247/Phoenix-Package_handler', '_blank')">
    &#128295; Admin &#8594; GitHub Repo
  </button>

  <input type="text" id="search" placeholder="Search by name, hex, or description..." onkeyup="filterTable()">

  <div id="status">Loading glossary...</div>
  
  <table id="glossaryTable">
    <thead>
      <tr>
        <th class="name-col">Name / ID</th>
        <th>Hex</th>
        <th>Description</th>
        <th>State</th>
        <th>Intake Date</th>
        <th>Size</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <div id="detail-panel">
    <strong>Selected Entry Details:</strong><br><br>
    <div id="detail-content"></div>
  </div>

  <script>
    const workerUrl = "https://packages-worker.phoenix-jwl.workers.dev";

    async function loadGlossary() {
      const status = document.getElementById("status");
      try {
        const res = await fetch(workerUrl + "/glossary");
        if (!res.ok) throw new Error("HTTP " + res.status);
        const data = await res.json();
        let items = data.glossary || (Array.isArray(data) ? data : []);
        const tbody = document.querySelector("#glossaryTable tbody");
        tbody.innerHTML = "";
        items.forEach(function(item) {
          const displayName = item.name && item.name !== "null" && item.name !== ""
            ? item.name
            : "Unnamed #" + (item.id || (item.hex ? item.hex.substring(0,8) : "") || "-");
          const row = document.createElement("tr");
          row.innerHTML =
            "<td class='name-col'>" + displayName + "</td>" +
            "<td style='font-family:monospace;font-size:0.85em'>" + (item.hex || "-") + "</td>" +
            "<td>" + (item.description || "-") + "</td>" +
            "<td>" + (item.state || "-") + "</td>" +
            "<td>" + (item.intaked_at ? item.intaked_at.substring(0,16) : "-") + "</td>" +
            "<td>" + (item.size || "-") + "</td>";
          row.onclick = function() { showDetails(item, displayName); };
          tbody.appendChild(row);
        });
        status.textContent = "Loaded " + items.length + " items. Click any row for details.";
      } catch (e) {
        console.error(e);
        status.innerHTML = "Failed to load. Error: " + e.message;
      }
    }

    function showDetails(item, displayName) {
      const panel = document.getElementById("detail-panel");
      const content = document.getElementById("detail-content");
      content.innerHTML =
        "<strong>Name:</strong> " + displayName + "<br>" +
        "<strong>Hex:</strong> " + (item.hex || "-") + "<br>" +
        "<strong>Description:</strong> " + (item.description || "-") + "<br>" +
        "<strong>Pool Path:</strong> " + (item.pool_path || "-") + "<br>" +
        "<strong>Size:</strong> " + (item.size || "-") + " bytes<br>" +
        "<strong>Intaked:</strong> " + (item.intaked_at || "-") + "<br><br>" +
        "<em>Code viewer coming soon after clean re-intake.</em>";
      panel.style.display = "block";
    }

    function filterTable() {
      const term = document.getElementById("search").value.toLowerCase().trim();
      const rows = document.querySelectorAll("#glossaryTable tbody tr");
      rows.forEach(function(row) {
        row.style.display = (term === "" || row.textContent.toLowerCase().includes(term)) ? "" : "none";
      });
    }

    loadGlossary();
  </script>
</body>
</html>
