<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Phoenix Glossary</title>
  <style>
    body { font-family: system-ui, sans-serif; background: #0f0f0f; color: #ddd; margin: 0; padding: 20px; }
    h1 { color: #00ddff; }
    input { width: 100%; padding: 12px; margin-bottom: 20px; background: #1a1a1a; color: #ddd; border: 1px solid #444; border-radius: 6px; font-size: 1rem; }
    table { width: 100%; border-collapse: collapse; background: #1a1a1a; }
    th, td { padding: 12px; text-align: left; border-bottom: 1px solid #333; }
    th { background: #222; }
    .admin-btn { background: #ffaa00; color: #000; padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; margin: 10px 0; }
  </style>
</head>
<body>
  <h1>Phoenix Glossary</h1>
  <button class="admin-btn" onclick="window.location.href='https://github.com/jwl247/Phoenix-Package_handler'">Admin / Go to Repo</button>
  <input type="text" id="search" placeholder="Search by name, hex, or description..." onkeyup="filterTable()">

  <table id="glossaryTable">
    <thead>
      <tr>
        <th>Hex</th>
        <th>Name</th>
        <th>Description</th>
        <th>State</th>
        <th>Intake Date</th>
        <th>Pool Path</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <script>
    const workerUrl = "https://packages-worker.phoenix-jwl.workers.dev";

    async function loadGlossary() {
      try {
        const res = await fetch(`${workerUrl}/glossary`);
        const data = await res.json();
        const tbody = document.querySelector("#glossaryTable tbody");
        tbody.innerHTML = "";

        data.forEach(item => {
          const row = document.createElement("tr");
          row.innerHTML = `
            <td>${item.hex || "—"}</td>
            <td>${item.name || "—"}</td>
            <td>${item.description || "—"}</td>
            <td>${item.state || "—"}</td>
            <td>${item.intaked_at || "—"}</td>
            <td style="font-size:0.9rem;">${item.pool_path ? item.pool_path.substring(0,60)+"..." : "—"}</td>
          `;
          tbody.appendChild(row);
        });
      } catch(e) {
        console.error(e);
        alert("Could not load glossary. Is the worker running?");
      }
    }

    function filterTable() {
      const term = document.getElementById("search").value.toLowerCase();
      const rows = document.querySelectorAll("#glossaryTable tbody tr");
      rows.forEach(row => {
        const text = row.textContent.toLowerCase();
        row.style.display = text.includes(term) ? "" : "none";
      });
    }

    loadGlossary();
  </script>
</body>
</html>
